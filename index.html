<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>InDrive</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg first_nav">
        <div class="container logo">
          <a class="navbar-brand" href="index.html" style="color: #fff;">
            <img src="images/indrive-icon-logo.png" alt="Logo de InDrive">
            InDrive
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent diff_lien">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="#" style="color: #fff;">Déplacer-vous avec InDrive</a>
                <!-- <a class="nav-link active"href="#">Déplacer-vous avec InDrive</a> -->
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Génerer des revenus</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Professionel</a>
              </li>
              
            </ul>
            <ul class="navbar-nav mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link"href="#">Connexion</a>
                </li>
                <li class="nav-item inscription ms-3">
                    <a class="nav-link"href="#">S'inscrire</a>
                </li>
            </ul>
          </div>
        </div>
      </nav>
    
      <div class="container" style="margin: 60px auto;">
        <div class="row">
            <div class="col-lg-6">
                <div class="ajuste">
                    <div class="d-flex gap-3">
                        <!-- Appelle au fonction javascript pour définir le lieu auto -->
                        <i class="fa-solid fa-location-dot"></i>
                        <h6>Antananarivo, MG</h6>
                    </div>
                    
                    <h1 class="fw-bold my-3" style="color: #000; font-size: 3.1em;">Allez où vous <br>voulez avec InDrive</h1>
                    <div class="choix_temps ms-4 my-3">
                        <i class="fa-solid fa-clock"></i>
                        <select name="" id="">
                            <option value="">
                                <i class="fa-solid fa-clock"></i>
                                Prendre en charge maintenant
                            </option>
                            <option value="">Planifier plus tard</option>
                        </select>
                    </div>
                    <div class="champs my-3">
                      <div>
                        <div class="de depart d-flex align-items-center" style="position: relative;">
                          <i class="fa-solid fa-circle" style="position: relative;">
                              <div class="trace"></div>
                          </i>
                          <div class="loader1"></div>
                          <input type="text" placeholder="Départ" class="ms-3" id="dep">
                          <div id="resultat"></div>
                      </div>
                      
                      </div>
                        
                        <!-- <div class="ms-4 px-4 py-1" id="resDep"></div> -->
                        <br>
                        <div class="de destination d-flex align-items-center" style="position: relative;">
                            <i class="fa-solid fa-square"></i>
                            <div class="loader2"></div>
                            <input type="text" placeholder="Destination" class="ms-3" id="dest">
                            <div id="resultat2"></div>
                        </div>
                    </div>
                    <div class="reserver">
                        <button>Réserver</button>
                    </div>
                </div>
                
            </div>
            <div class="col-lg-6 imUber">
                <img src="images/imageUber.jpg" alt="imageUber">
            </div>
        </div>
      </div>

    <script src="script.js"></script>
</body>
</html>
